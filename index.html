let leg=[], vk=[], kst=[], inv=[], klanten=[], kippen=[], reserveringen=[], abonnementen=[], schoonmaak=[], notities=[], activePage="dashboard", activeM=null, activeKlant=null, modalState=null;
let instellingen = { prijsPerEi: 0.40, doosjeGrootte: 6, prijsDoosje6: 2.50, prijsDoosje10: 4.00, bezorgkosten: 1.00, boerderijNaam: "Ben's Boerderij", klantGroen: 7, klantOranje: 14, loyaliteitDrempel: 10, hokFrequentie: 14, weerLat: 50.9057, weerLon: 5.7815, weerNaam: "Ulestraten", seizoensNieuws: "", seizoensVanaf: "", seizoensTm: "" };

function doosjes(n) {
  const d = instellingen.doosjeGrootte || 6;
  return Math.floor(n / d) + " doosjes + " + (n % d) + " los";
}

function getMaandSamenvatting(ym) {
  // ym = "2026-03"
  const legM  = leg.filter(r=>r.datum.startsWith(ym));
  const vkM   = vk.filter(r=>r.datum.startsWith(ym));
  const kstM  = kst.filter(r=>r.datum.startsWith(ym));
  const totLeg = legM.reduce((s,r)=>s+(r.aantal||0),0);
  const totVk  = vkM.reduce((s,r)=>s+(r.totaal||0),0);
  const totKst = kstM.reduce((s,r)=>s+(r.bedrag||0),0);
  const bestedag = legM.length ? legM.reduce((a,b)=>(b.aantal||0)>(a.aantal||0)?b:a, legM[0]) : null;
  // Beste klant
  const klantTotals = {};
  vkM.forEach(r=>{ const k=r.koper||"Onbekend"; klantTotals[k]=(klantTotals[k]||0)+(r.totaal||0); });
  const besteKlant = Object.entries(klantTotals).sort((a,b)=>b[1]-a[1])[0] || null;
  return { totLeg, totVk, totKst, bestedag, besteKlant, aantalVk: vkM.length };
}

function getKlantFrequentie(klantNaam, klantKey) {
  const kvk = vk.filter(r=>(klantKey && r.klantId===klantKey) || r.koper===klantNaam);
  if(!kvk.length) return null;
  kvk.sort((a,b)=>a.datum.localeCompare(b.datum));
  const eerste = kvk[0].datum;
  const laatste = kvk[kvk.length-1].datum;
  const dagenGeleden = Math.floor((new Date() - new Date(laatste+"T12:00:00")) / 86400000);
  return { eerste, laatste, dagenGeleden, aantalBezoeken: kvk.length };
}

function calcStreak() {
  // Count consecutive days ending today where eieren were filled in
  const dates = new Set(leg.map(r=>r.datum));
  let streak = 0;
  const d = new Date(); 
  // If today not filled, start counting from yesterday
  if(!dates.has(today())) d.setDate(d.getDate()-1);
  while(true) {
    const ds = d.toISOString().slice(0,10);
    if(dates.has(ds)) { streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  return streak;
}

  if(!el) return;

  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2400);
}

// ── DB helpers ────────────────────────────────────────────────────────────
async function dbSave(path, data) {
  setSyncBadge("busy");
  try { await set(ref(db, path), data); setSyncBadge("ok"); }
  catch(e) { setSyncBadge("err"); toast("❌ Fout: "+e.message); throw e; }
}
async function dbRemove(path) {
  setSyncBadge("busy");
  try { await remove(ref(db, path)); setSyncBadge("ok"); }
  catch(e) { setSyncBadge("err"); toast("❌ Fout: "+e.message); throw e; }
}

// ── CRUD — Verkopen ───────────────────────────────────────────────────────
async function saveVk() {
  const datum      = val("vk-datum") || today();
  const klantKey   = val("vk-klant-select");
  const nieuweNaam = val("vk-nieuwe-klant").trim();
  const betaal     = val("vk-betaal");
  const notitie    = val("vk-notitie");
  const prijsEl    = document.getElementById("vk-prijs-per-ei");

  // Bereken aantal en totaal op basis van verkooptype
  let aantal = 0, totaal = 0, notitieExtra = "";
  if(vkType === "los") {
    aantal = parseInt(val("vk-aantal"))||0;
    const p = parseFloat((prijsEl||{}).value) || prijs();
    totaal = aantal * p;
  } else if(vkType === "doos6") {
    const nd = parseInt(val("vk-doosjes"))||0;
    const p = parseFloat((prijsEl||{}).value) || (instellingen.prijsDoosje6||2.50);
    aantal = nd * 6;
    totaal = nd * p;
    notitieExtra = nd + "x doosje 6";
  } else if(vkType === "doos10") {
    const nd = parseInt(val("vk-doosjes"))||0;
    const p = parseFloat((prijsEl||{}).value) || (instellingen.prijsDoosje10||4.00);
    aantal = nd * 10;
    totaal = nd * p;
    notitieExtra = nd + "x doosje 10";
  }

  if(!datum||aantal<1) return toast("⚠️ Vul datum en aantal in");

  // Resolve klant
  let koper="", klantId="";
  if(klantKey==="nieuw" && nieuweNaam) {
    const nk = uid();
    await dbSave("klanten/"+nk, {naam:nieuweNaam, notitie:""});
    klantId=nk; koper=nieuweNaam;
  } else if(klantKey && klantKey!=="") {
    const k = klanten.find(k=>k._key===klantKey);
    klantId=klantKey; koper=k?k.naam:"";
  }

  const finalNotitie = [notitieExtra, notitie].filter(Boolean).join(" · ");
  const key = uid();
  await dbSave("verkopen/"+key, {datum,aantal,koper,klantId,betaal,totaal,notitie:finalNotitie});
  ["vk-aantal","vk-doosjes","vk-notitie","vk-nieuwe-klant"].forEach(id=>set_val(id,""));
  set_val("vk-datum",today()); set_val("vk-totaal",""); set_val("vk-klant-select","");
  // Reset prijs naar standaard
  if(prijsEl) prijsEl.value = (instellingen.prijsPerEi||0.40).toFixed(2);
  toast("✅ Verkoop opgeslagen!");
}

    // Beschikbare jaren
    const jaren = [...new Set(echt.map(r=>r.datum.slice(0,4)))].sort().reverse();
    const curJaar = schoonHistorieJaar || (jaren[0] || new Date().getFullYear().toString());
    const rijen = echt.filter(r=>r.datum.startsWith(curJaar));
    const freq = instellingen.hokFrequentie || 14;

    // Bereken dagen tussen schoonmaken per rij
    const rijsMetDagen = rijen.map((r,i) => {
      const vorigeRij = rijen[i+1];
      const dagenNaVorige = vorigeRij
        ? Math.round((new Date(r.datum+"T12:00:00") - new Date(vorigeRij.datum+"T12:00:00")) / 86400000)
        : null;
      return { ...r, dagenNaVorige };
    });

    // Balkengrafiek SVG
    const maxDagen = Math.max(...rijsMetDagen.filter(r=>r.dagenNaVorige).map(r=>r.dagenNaVorige), freq, 1);
    const W=340, H=120, padL=36, padB=20, padT=10, padR=8;
    const chartW=W-padL-padR, chartH=H-padB-padT;
    const grafiekRijen = rijsMetDagen.filter(r=>r.dagenNaVorige!==null).reverse();
    const barW = grafiekRijen.length > 0 ? Math.max(8, Math.floor((chartW-(grafiekRijen.length+1)*3)/grafiekRijen.length)) : 20;
    const bars = grafiekRijen.map((r,i)=>{
      const bh = Math.max(2, Math.round((r.dagenNaVorige/maxDagen)*chartH));
      const bx = padL + i*(barW+3) + 4;
      const by = padT+chartH-bh;
      const kleur = r.dagenNaVorige > freq ? "#c0392b" : "#27ae60";
      const maandLbl = r.datum.slice(5,7)+"/"+r.datum.slice(2,4);
      return `<rect x="${bx}" y="${by}" width="${barW}" height="${bh}" fill="${kleur}" rx="3"/>
        <text x="${bx+barW/2}" y="${H-6}" text-anchor="middle" font-size="8" fill="#a06020">${maandLbl}</text>
        <text x="${bx+barW/2}" y="${by-3}" text-anchor="middle" font-size="8" fill="#5a3200">${r.dagenNaVorige}d</text>`;
    }).join("");
    const freqY = padT + chartH - (freq/maxDagen)*chartH;
    const freqLine = `<line x1="${padL}" y1="${freqY}" x2="${W-padR}" y2="${freqY}" stroke="#e07b00" stroke-width="1.5" stroke-dasharray="4,3"/>
      <text x="${W-padR+2}" y="${freqY+4}" font-size="8" fill="#e07b00">${freq}d</text>`;
    const yTick = Math.round(maxDagen/2);
    const yLines = [0,yTick,maxDagen].map(v=>{
      const y2=padT+chartH-(v/maxDagen)*chartH;
      return `<line x1="${padL}" y1="${y2}" x2="${W-padR}" y2="${y2}" stroke="#e8d5a0" stroke-dasharray="2,3"/>
        <text x="${padL-4}" y="${y2+4}" text-anchor="end" font-size="8" fill="#a06020">${v}</text>`;
    }).join("");
    const svg = grafiekRijen.length > 0 ? `<svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:${W}px;display:block">
      ${yLines}${bars}${freqLine}
      <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+chartH}" stroke="#c8860a" stroke-width="1"/>
      <line x1="${padL}" y1="${padT+chartH}" x2="${W-padR}" y2="${padT+chartH}" stroke="#c8860a" stroke-width="1"/>
    </svg>` : `<div style="font-size:12px;color:var(--txl);text-align:center;padding:20px 0">Niet genoeg data voor grafiek</div>`;

    // Tabel
    const tabel = rijen.length === 0
      ? `<div style="font-size:12px;color:var(--txl);text-align:center;padding:16px 0">Geen data in ${curJaar}</div>`
      : `<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">
          <thead><tr style="background:var(--gd)">
            <th style="padding:6px 8px;text-align:left;color:var(--bd);font-weight:800">Datum</th>
            <th style="padding:6px 8px;text-align:center;color:var(--bd);font-weight:800">Interval</th>
            <th style="padding:6px 8px;text-align:left;color:var(--bd);font-weight:800">Notitie</th>
            <th style="padding:6px 8px;text-align:center;color:var(--bd);font-weight:800"></th>
          </tr></thead>
          <tbody>${rijsMetDagen.map((r,i)=>`<tr style="border-bottom:1px solid var(--gd)">
            <td style="padding:6px 8px;color:var(--tx)">${fmtD(r.datum)}</td>
            <td style="padding:6px 8px;text-align:center;font-weight:800;color:${r.dagenNaVorige===null?"var(--txl)":r.dagenNaVorige>freq?"var(--rd)":"var(--gn)"}">
              ${r.dagenNaVorige===null?"—":r.dagenNaVorige+"d"}
            </td>
            <td style="padding:6px 8px;color:var(--txl);font-style:italic">${esc(r.notitie||"")}</td>
            <td style="padding:6px 8px;text-align:center"><button class="dbtn" onclick="deleteSchoonmaak('${r._key}')">🗑</button></td>
          </tr>`).join("")}</tbody>
        </table></div>`;

    const jaarTabs = jaren.length > 1
      ? `<div class="tabs" style="margin-bottom:12px">${jaren.map(j=>`<div class="tab${j===curJaar?" active":""}" onclick="setSchoonHistorieJaar('${j}')">${j}</div>`).join("")}</div>`
      : "";

    const legenda = `<div style="display:flex;gap:12px;font-size:10px;color:var(--txl);margin-top:6px;margin-bottom:12px;align-items:center">
      <span style="display:inline-block;width:10px;height:10px;background:#27ae60;border-radius:2px"></span> Binnen frequentie
      <span style="display:inline-block;width:10px;height:10px;background:#c0392b;border-radius:2px"></span> Overschreden
      <span style="display:inline-block;width:18px;height:0;border-top:2px dashed #e07b00"></span> Doel ${freq}d
    </div>`;

    el.innerHTML = `
      <div class="modal-title">&#x1F9F9; Schoonmaak historie <button onclick="closeModal()">&#x2715;</button></div>
      ${jaarTabs}
      ${grafiekRijen.length > 0 ? `<div style="margin-bottom:4px">${svg}</div>${legenda}` : ""}
      ${tabel}`;
  }
}

// ── CSV export ─────────────────────────────────────────────────────────────
function exportCSV(type) {
  let rows, header, filename;
  if(type==="legdagen"){
    header="datum,aantal,notitie";
    rows=leg.map(r=>[r.datum,r.aantal,`"${(r.notitie||"").replace(/"/g,'""')}"`].join(","));
    filename="bens_legdagen.csv";
  } else if(type==="verkopen"){
    header="datum,aantal,koper,betaalwijze,totaal,notitie";
    rows=vk.map(r=>[r.datum,r.aantal,`"${(r.koper||"").replace(/"/g,'""')}"`,r.betaal,Number(r.totaal).toFixed(2),`"${(r.notitie||"").replace(/"/g,'""')}"`].join(","));
    filename="bens_verkopen.csv";
  } else if(type==="investeringen") {
    header="datum,bedrag,omschrijving,categorie,leverancier";
    rows=inv.map(r=>[r.datum,Number(r.bedrag).toFixed(2),`"${(r.omschr||"").replace(/"/g,'""')}"`,r.cat,`"${(r.leverancier||"").replace(/"/g,'""')}"`].join(","));
    filename="bens_investeringen.csv";
  } else {
    header="datum,bedrag,omschrijving,categorie,leverancier";
    rows=kst.map(r=>[r.datum,Number(r.bedrag).toFixed(2),`"${(r.omschr||"").replace(/"/g,'""')}"`,r.cat,`"${(r.leverancier||"").replace(/"/g,'""')}"`].join(","));
    filename="bens_kosten.csv";
  }
  const csv="\uFEFF"+[header,...rows].join("\n");
  const a=document.createElement("a");
  a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
  a.download=filename; a.click();
  toast("📥 "+filename+" gedownload");
}

              const dagen = isHuidigeMaand ? parseInt(today().slice(8,10)) : dagenInMaand;
              const totaal = rijen.reduce((s,r)=>s+(r.aantal||0),0);
              maandData[m].totaal += totaal;
              maandData[m].dagen += dagen;

          });
          const gemPerMaand = Object.entries(maandData).map(([m,d])=>({
            m:parseInt(m),
            gem: d.dagen>0 ? Math.round((d.totaal/d.dagen)*10)/10 : 0
          }));
          const maxGem = Math.max(...gemPerMaand.map(x=>x.gem),1);
          const W=380, H=140, padL=28, padB=28, padT=10, padR=8;
          const chartW=W-padL-padR, chartH=H-padB-padT;
          const barW=Math.floor(chartW/12)-3;
          const zomerKleur = m => m>=4&&m<=9 ? "#27ae60" : "#3498db";
          const bars = gemPerMaand.map((x,i)=>{
            const bh=x.gem===0?0:Math.max(2,Math.round((x.gem/maxGem)*chartH));
            const bx=padL+i*(barW+3)+2;
            const by=padT+chartH-bh;
            return `<rect x="${bx}" y="${by}" width="${barW}" height="${bh}" fill="${zomerKleur(x.m)}" rx="2"/>

              <line x1="${padL}" y1="${padT+chartH}" x2="${W-padR}" y2="${padT+chartH}" stroke="#c8860a" stroke-width="1"/>

            if(!geboortedatum) return null;
            const ms = new Date() - new Date(geboortedatum+"T12:00:00");
            const mnd = Math.floor(ms / (1000*60*60*24*30.5));

              `<button class="ebtn" onclick='openModal("kip",${kipData})' style="font-size:11px">✏️</button>` +
              `<button class="dbtn" onclick="deleteKip('${k._key}')" style="font-size:11px">🗑</button>` +
              `</div></div>`;
          }

          const actiefByRas = {};
          actief.forEach(k=>{ if(!actiefByRas[k.ras]) actiefByRas[k.ras]=[]; actiefByRas[k.ras].push(k); });

                `<div style="font-size:11px;font-weight:800;color:var(--bl);margin-bottom:6px">${RAS_ICONS[ras]||"🐔"} ${ras}</div>` +

          const uitHtml = uitgevallen.length===0 ? "" :

            `<div style="font-size:11px;font-weight:800;color:var(--txl);margin-bottom:8px">🪦 Niet meer actief (${uitgevallen.length})</div>` +

          // Statistieken
          const metGeb = actief.filter(k=>k.geboortedatum);
          const gemLeeftijdMnd = metGeb.length
            ? Math.round(metGeb.reduce((s,k)=>{
                return s + (new Date()-new Date(k.geboortedatum+"T12:00:00"))/(1000*60*60*24*30.5);
              },0)/metGeb.length)
            : null;

          const statsHtml = `<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
            <div style="background:var(--gl);border-radius:8px;border:1px solid var(--gd);padding:6px 12px;font-size:11px;text-align:center;flex:1">
              <div style="font-family:'Fredoka One',cursive;font-size:18px;color:var(--or)">${actief.length}</div>
              <div style="color:var(--txl);font-weight:700">Actief</div>
            </div>
            <div style="background:var(--gl);border-radius:8px;border:1px solid var(--gd);padding:6px 12px;font-size:11px;text-align:center;flex:1">
              <div style="font-family:'Fredoka One',cursive;font-size:18px;color:var(--txl)">${uitgevallen.length}</div>
              <div style="color:var(--txl);font-weight:700">Uitgevallen</div>
            </div>
            ${gemLeeftijdMnd!==null?`<div style="background:var(--gl);border-radius:8px;border:1px solid var(--gd);padding:6px 12px;font-size:11px;text-align:center;flex:1">
              <div style="font-family:'Fredoka One',cursive;font-size:18px;color:var(--or)">${gemLeeftijdMnd<24?gemLeeftijdMnd+"m":(gemLeeftijdMnd/12).toFixed(1)+"j"}</div>
              <div style="color:var(--txl);font-weight:700">Gem. leeftijd</div>
            </div>`:""}

        ${(()=>{
          const supported = ("Notification" in window) && ("serviceWorker" in navigator);
          if(!supported) return '<div style="font-size:12px;color:var(--txl);background:var(--gl);border-radius:10px;padding:10px 14px">' +

          const permLabel = perm==="granted"?"✅ Toestemming verleend":perm==="denied"?"❌ Geblokkeerd door browser":"⏳ Nog niet gevraagd";
          const permKleur = perm==="granted"?"color:var(--gn)":perm==="denied"?"color:var(--rd)":"color:var(--or)";
          return `<div style="background:var(--gl);border-radius:10px;border:1.5px solid var(--gd);padding:10px 14px;margin-bottom:12px">

// ── CHART ──────────────────────────────────────────────────────────────────
let chartView = "maand";
let chartM    = null;

function openChart(m, view) {
  chartM    = m || (today().slice(0,7));
  chartView = view || "maand";
  const ov = document.getElementById("chart-overlay");
  if(ov) ov.classList.add("open");
  renderChart();
}
function closeChart() {
  const ov = document.getElementById("chart-overlay");
  if(ov) ov.classList.remove("open");
}
function switchChartView(v) {
  chartView = v;
  renderChart();
}
function setChartM(m) {
  chartM = m;
  renderChart();
}

function renderChart() {
  // Update tab highlights
  ["maand","jaar"].forEach(v => {
    const el = document.getElementById("ctab-"+v);
    if(el) el.className = "tab" + (chartView===v?" active":"");
  });

  const maanden = [...new Set(leg.map(r=>r.datum.slice(0,7)))].sort().reverse();

  // Month selector tabs (only show in maand view)
  const tabsEl = document.getElementById("chart-maand-tabs");
  if(tabsEl) {
    if(chartView==="maand") {
      tabsEl.style.display = "flex";
      tabsEl.innerHTML = maanden.map(m=>{
        const [y,mo]=m.split("-");
        return `<div class="tab${m===chartM?" active":""}" style="flex-shrink:0;padding:5px 12px;font-size:11px" onclick="setChartM('${m}')">${MNAMEN[parseInt(mo)-1]} ${y}</div>`;
      }).join("");
    } else {
      tabsEl.style.display = "none";
    }
  }

  const container = document.getElementById("chart-container");
  if(!container) return;

  if(chartView === "maand") {
    renderMonthChart(container);
  } else {
    renderYearChart(container);
  }
}

function renderMonthChart(container) {
  if(!chartM) { container.innerHTML='<div class="empty"><div class="em">📅</div><p>Nog geen data</p></div>'; return; }

  const [y,mo] = chartM.split("-");
  const title = document.getElementById("chart-title");
  if(title) title.textContent = `🥚 ${MNAMEN[parseInt(mo)-1]} ${y}`;

  // Build days array for full month
  const daysInMonth = new Date(parseInt(y), parseInt(mo), 0).getDate();
  const days = [];
  for(let d=1; d<=daysInMonth; d++) {
    const datum = `${y}-${mo}-${String(d).padStart(2,"0")}`;
    const rec   = leg.find(r=>r.datum===datum);
    days.push({ d, datum, n: rec ? (rec.aantal||0) : 0, hasData: !!rec });
  }

  const maxN  = Math.max(...days.map(x=>x.n), 1);
  const tot   = days.reduce((s,x)=>s+x.n, 0);
  const gem   = tot / daysInMonth;
  const maxDag= days.reduce((a,b)=>b.n>a.n?b:a, days[0]);

  // SVG bar chart
  const W=420, H=160, padL=28, padB=24, padT=10, padR=8;
  const chartW = W-padL-padR, chartH = H-padB-padT;
  const barW   = Math.max(2, Math.floor(chartW/daysInMonth)-1);
  const gap    = (chartW - barW*daysInMonth) / (daysInMonth+1);

  // Y axis ticks
  const yTicks = [0, Math.round(maxN/2), maxN];

  let bars = days.map((x,i) => {
    const bh  = x.n === 0 ? 0 : Math.max(2, Math.round((x.n/maxN)*chartH));
    const bx  = padL + gap + i*(barW+gap);
    const by  = padT + chartH - bh;
    const isWe = new Date(x.datum+"T12:00:00").getDay() % 6 === 0;
    const col  = x.n===0 ? "#e8d5a0" : isWe ? "#c8860a" : "#e07b00";
    const lbl  = x.d % 5 === 0 || x.d===1 ? String(x.d) : "";
    return `
      <rect x="${bx}" y="${by}" width="${barW}" height="${bh}" fill="${col}" rx="2"
        style="cursor:pointer" title="${x.datum}: ${x.n} eieren"/>
      ${lbl?`<text x="${bx+barW/2}" y="${H-8}" text-anchor="middle" font-size="9" fill="#a06020">${lbl}</text>`:""}
    `;
  }).join("");

  let yAxisLines = yTicks.map(tick=>{
    const y2 = padT + chartH - (tick/maxN)*chartH;
    return `
      <line x1="${padL}" y1="${y2}" x2="${W-padR}" y2="${y2}" stroke="#e8d5a0" stroke-dasharray="3,3"/>
      <text x="${padL-4}" y="${y2+4}" text-anchor="end" font-size="9" fill="#a06020">${tick}</text>
    `;
  }).join("");

  // Average line
  const avgY = padT + chartH - (gem/maxN)*chartH;
  const avgLine = gem>0 ? `<line x1="${padL}" y1="${avgY}" x2="${W-padR}" y2="${avgY}" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="5,3"/><text x="${W-padR+2}" y="${avgY+4}" font-size="8" fill="#27ae60">gem</text>` : "";

  const svg = `<svg class="chart-svg" viewBox="0 0 ${W} ${H}" width="100%" style="max-width:${W}px">
    ${yAxisLines}
    ${bars}
    ${avgLine}
    <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+chartH}" stroke="#c8860a" stroke-width="1"/>
    <line x1="${padL}" y1="${padT+chartH}" x2="${W-padR}" y2="${padT+chartH}" stroke="#c8860a" stroke-width="1"/>
  </svg>`;

  container.innerHTML = `
    <div class="chart-wrap">${svg}</div>
    <div style="display:flex;gap:6px;margin-top:4px;font-size:10px;color:var(--txl);align-items:center">
      <span style="display:inline-block;width:12px;height:10px;background:#e07b00;border-radius:2px"></span> Weekdag
      <span style="display:inline-block;width:12px;height:10px;background:#c8860a;border-radius:2px;margin-left:6px"></span> Weekend
      <span style="display:inline-block;width:18px;height:2px;background:#27ae60;margin-left:6px"></span> Gemiddelde
    </div>
    <div class="chart-stats">
      <div class="chart-stat"><div class="csv">${tot}</div><div class="csl">TOTAAL</div></div>
      <div class="chart-stat"><div class="csv">${gem.toFixed(1)}</div><div class="csl">GEM/DAG</div></div>
      <div class="chart-stat"><div class="csv">${maxDag.n}</div><div class="csl">MAX DAG</div></div>
      <div class="chart-stat"><div class="csv">${days.filter(x=>x.n>0).length}</div><div class="csl">RAAP DAGEN</div></div>
    </div>`;
}

function renderYearChart(container) {
  const year = (chartM||today().slice(0,7)).slice(0,4);
  const prevYear = String(parseInt(year)-1);
  const title = document.getElementById("chart-title");
  if(title) title.textContent = `🥚 Jaaroverzicht ${year}`;

  const monthData = Array.from({length:12}, (_,mi)=>{
    const m = `${year}-${String(mi+1).padStart(2,"0")}`;
    const rows = leg.filter(r=>r.datum.startsWith(m));
    return { mi, m, n: rows.reduce((s,r)=>s+(r.aantal||0),0) };
  });

  const maxN = Math.max(...monthData.map(x=>x.n), 1);
  const tot  = monthData.reduce((s,x)=>s+x.n, 0);
  const gem  = tot / 12;

  const W=420, H=160, padL=32, padB=24, padT=10, padR=8;
  const chartW=W-padL-padR, chartH=H-padB-padT;
  const barW=Math.floor(chartW/12)-3;

  // Previous year data for comparison
  const prevMonthData = Array.from({length:12}, (_,mi)=>{
    const m = `${prevYear}-${String(mi+1).padStart(2,'0')}`;
    return leg.filter(r=>r.datum.startsWith(m)).reduce((s,r)=>s+(r.aantal||0),0);
  });
  const maxNAll = Math.max(...monthData.map(x=>x.n), ...prevMonthData, 1);
  const bars = monthData.map((x,i)=>{
    const bh = x.n===0?0:Math.max(2,Math.round((x.n/maxNAll)*chartH));
    const bx = padL + i*(barW+3) + 4;
    const by = padT+chartH-bh;
    return `
      <rect x="${bx}" y="${by}" width="${barW}" height="${bh}" fill="#e07b00" rx="3"
        onclick="setChartM('${x.m}');switchChartView('maand')" style="cursor:pointer"/>
      <text x="${bx+barW/2}" y="${H-8}" text-anchor="middle" font-size="9" fill="#a06020">${MNAMEN[x.mi].slice(0,1)}</text>
      ${x.n>0?`<text x="${bx+barW/2}" y="${by-3}" text-anchor="middle" font-size="8" fill="#7a4500">${x.n}</text>`:""}
    `;
  }).join("");

  const yTicks = [0, Math.round(maxN/2), maxN];
  const yLines = yTicks.map(tick=>{
    const y2=padT+chartH-(tick/maxN)*chartH;
    return `<line x1="${padL}" y1="${y2}" x2="${W-padR}" y2="${y2}" stroke="#e8d5a0" stroke-dasharray="3,3"/>
            <text x="${padL-4}" y="${y2+4}" text-anchor="end" font-size="9" fill="#a06020">${tick}</text>`;
  }).join("");

  const avgY = padT+chartH-(gem/maxN)*chartH;
  const avgLine = gem>0?`<line x1="${padL}" y1="${avgY}" x2="${W-padR}" y2="${avgY}" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="${W-padR+2}" y="${avgY+4}" font-size="8" fill="#27ae60">gem</text>`:"";

  const prevBars = prevMonthData.map((pn,i)=>{
    const bh2 = pn===0?0:Math.max(2,Math.round((pn/maxNAll)*chartH));
    const bx2 = padL + i*(barW+3) + 4;
    const by2 = padT+chartH-bh2;
    return pn>0?`<rect x="${bx2}" y="${by2}" width="${barW}" height="${bh2}" fill="none" stroke="#c8860a" stroke-width="1" stroke-dasharray="3,2" rx="2" opacity="0.5"/>`:""
  }).join("");
  const svg = `<svg class="chart-svg" viewBox="0 0 ${W} ${H}" width="100%" style="max-width:${W}px">
    ${yLines}${prevBars}${bars}${avgLine}
    <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+chartH}" stroke="#c8860a" stroke-width="1"/>
    <line x1="${padL}" y1="${padT+chartH}" x2="${W-padR}" y2="${padT+chartH}" stroke="#c8860a" stroke-width="1"/>
  </svg>`;

  container.innerHTML = `
    <div class="chart-wrap">${svg}</div>
    <div style="display:flex;gap:12px;margin-top:4px;font-size:10px;color:var(--txl);align-items:center;justify-content:center">
      <span style="display:inline-block;width:12px;height:10px;background:#e07b00;border-radius:2px"></span> ${year}
      <span style="display:inline-block;width:18px;height:10px;border:1px dashed #c8860a;border-radius:2px;opacity:0.6"></span> ${prevYear}
      &nbsp;· Tik op maand voor detail
    </div>
    <div class="chart-stats">
      <div class="chart-stat"><div class="csv">${tot}</div><div class="csl">JAAR TOTAAL</div></div>
      <div class="chart-stat"><div class="csv">${Math.round(gem)}</div><div class="csl">GEM/MAAND</div></div>
      <div class="chart-stat"><div class="csv">${(tot/365).toFixed(1)}</div><div class="csl">GEM/DAG</div></div>
      <div class="chart-stat"><div class="csv">${monthData.filter(x=>x.n>0).length}</div><div class="csl">ACTIEVE MNDN</div></div>
    </div>`;
}


// ── CRUD — Reserveringen ────────────────────────────────────────────────────
async function saveReservering() {
  const naam  = val("res-naam").trim();
  const datum = val("res-datum") || today();
  const doosjeKeuze = parseInt(val("res-doosje")) || 6;
  const aantal = doosjeKeuze;
  const doosPrijs = doosjeKeuze === 10 ? (instellingen.prijsDoosje10 || window._pubPrijsDoosje10 || 4.00) : (instellingen.prijsDoosje6 || window._pubPrijsDoosje6 || 2.50);
  const tel       = val("res-tel").trim();
  const bezorging = document.getElementById("opt-bezorgen")?.style.background?.includes("e07b00") ||
                    document.getElementById("opt-bezorgen")?.style.background?.includes("var(--or)") || false;
  const adres     = bezorging ? ((document.getElementById("res-adres")||{}).value||"").trim() : "";
  const bezorgKosten = bezorging ? (typeof instellingen !== "undefined" && instellingen.bezorgkosten ? instellingen.bezorgkosten : (window._pubBezorgkosten ?? 1.00)) : 0;
  if(!naam) return showResError("\u26A0\uFE0F Vul je naam in");
  if(datum < today()) return showResError("\u26A0\uFE0F Kies een datum vanaf vandaag");
  if(bezorging && !adres) return showResError("\u26A0\uFE0F Vul een bezorgadres in");
  const key = uid();
  try {
    await dbSave("reserveringen/"+key, {naam, datum, aantal, tel, doosPrijs: doosPrijs + bezorgKosten, bezorging, adres: adres||null, status:"nieuw", aangemeld: today()});
    // Update local counters immediately (Firebase /publiek updated by Ben on next login)
    window._pubGereserveerd = (window._pubGereserveerd || 0) + aantal;
    window._pubVoorraad = (window._pubVoorraad !== null) ? window._pubVoorraad - aantal : null;
    // Write updated gereserveerd to /publiek so refresh shows correct value
    // publiek/gereserveerd wordt bijgewerkt door syncPubliekeData na inlog
    showResBevestiging(naam, datum, aantal, doosPrijs + bezorgKosten, bezorging, adres);
  } catch(e) {
    showResError("❌ Kon niet opslaan. Controleer je internetverbinding.");
  }
}
function showResError(msg) {
  const el = document.getElementById("res-error");
  if(el){ el.textContent=msg; el.classList.add("show"); }

async function accepteerRes(key, r) {
  if(!await bevestig("Reservering omzetten naar verkoop?", "✅ Ja, omzetten", "btn-s")) return;

  // Find or create klant
  let klantId = "";
  const bestaand = klanten.find(k=>k.naam.toLowerCase()===r.naam.toLowerCase());
  if(bestaand) {
    klantId = bestaand._key;
  } else {
    // Naam komt niet voor als klant — geef optie
    const kiesOpties = klanten.length > 0
      ? klanten.map((k,i)=>`${i+1}. ${k.naam}`).join("\n")
      : "";
    let keuze = null;
    if(klanten.length > 0) {
      const antwoord = prompt(
        `"${r.naam}" is geen bekende klant.\n\nKies een optie:\n0. Registreren als nieuwe klant\n${kiesOpties}\n\nVoer 0 in voor nieuwe klant, of het nummer van een bestaande klant:`
      );
      if(antwoord === null) return; // Geannuleerd
      const nr = parseInt(antwoord);
      if(nr > 0 && nr <= klanten.length) {
        keuze = klanten[nr-1];
      }
    }
    if(keuze) {
      klantId = keuze._key;
    } else {
      // Nieuwe klant aanmaken
      klantId = uid();
      await dbSave("klanten/"+klantId, { naam: r.naam, notitie: r.tel ? "📱 "+r.tel : "" });
    }
  }

  // Sla op als verkoop — gebruik de doosPrijs uit de reservering
  const vkKey = uid();
  // Gebruik doosPrijs uit reservering, anders huidige doosjesprijs uit instellingen
  const resTotaal = (r.doosPrijs && r.doosPrijs > 0)
    ? r.doosPrijs
    : r.aantal === 10 ? (instellingen.prijsDoosje10 || 4.00)
    : r.aantal === 6  ? (instellingen.prijsDoosje6  || 2.50)
    : r.aantal * prijs();
  await dbSave("verkopen/"+vkKey, {
    datum: r.datum, aantal: r.aantal, koper: r.naam, klantId,
    betaal: "Reservering", totaal: resTotaal,
    notitie: "Via reservering" + (r.tel?" · "+r.tel:"")
  });

  // Verwijder de reservering volledig (niet enkel status wijzigen)
  await dbRemove("reserveringen/"+key);

  // Sync publieke voorraad
  syncPubliekeData();
  toast("✅ Reservering omgezet naar verkoop!");
}

// ── Schoonmaak helpers ────────────────────────────────────────────────────
function getVolgendeSchoonmaak() {
  const freq = instellingen.hokFrequentie || 14;
  if (schoonmaak.length === 0) {
    // Geen historie: plan eerste aanstaande woensdag
    const d = new Date();
    const dag = d.getDay(); // 0=zo,1=ma,...,3=wo
    const diffNaarWo = (3 - dag + 7) % 7 || 7;
    d.setDate(d.getDate() + diffNaarWo);
    return d.toISOString().slice(0, 10);
  }
  const laatste = schoonmaak[0].datum;
  const volgende = new Date(laatste + "T12:00:00");
  volgende.setDate(volgende.getDate() + freq);
  return volgende.toISOString().slice(0, 10);
}

function getDagenTotSchoonmaak() {
  const volgende = getVolgendeSchoonmaak();
  return Math.ceil((new Date(volgende + "T12:00:00") - new Date()) / 86400000);
}

  85:"🌨️", 86:"❄️",
  95:"⛈️", 96:"⛈️", 99:"⛈️"
};
const WMO_TEKST = {
  0:"Helder", 1:"Licht bewolkt", 2:"Half bewolkt", 3:"Bewolkt",
  45:"Mist", 48:"Rijpmist",
  51:"Lichte motregen", 53:"Motregen", 55:"Zware motregen",
  61:"Lichte regen", 63:"Regen", 65:"Zware regen",
  71:"Lichte sneeuw", 73:"Sneeuw", 75:"Zware sneeuw",

  80:"Lichte buien", 81:"Buien", 82:"Zware buien",
  85:"Sneeuwbuien", 86:"Zware sneeuwbuien",

};

async function laadWeer() {
  const el = document.getElementById("weer-blok");
  if (!el) return;
  try {
    const lat  = instellingen.weerLat  ?? WEER_LAT;
    const lon  = instellingen.weerLon  ?? WEER_LON;
    const naam = instellingen.weerNaam ?? WEER_NAAM;
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Europe%2FAmsterdam&forecast_days=3`;
    const res = await fetch(url);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    const d = data.daily;
    const dagNamen = ["Vandaag", "Morgen", "Overmorgen"];
    const cols = [0,1,2].map(i => {
      const code  = d.weathercode[i] ?? 0;
      const icon  = WMO_ICON[code]  ?? "🌡️";
      const tekst = WMO_TEKST[code] ?? "";
      const max   = Math.round(d.temperature_2m_max[i]);
      const min   = Math.round(d.temperature_2m_min[i]);
      const regen = d.precipitation_probability_max[i] ?? 0;
      const regenKleur = regen >= 70 ? "color:#c0392b" : regen >= 40 ? "color:#e07b00" : "color:#27ae60";
      return `<div style="flex:1;text-align:center;padding:8px 4px;${i<2?"border-right:1px solid var(--gd)":""}">
        <div style="font-size:10px;font-weight:800;color:var(--bd);margin-bottom:4px">${dagNamen[i]}</div>
        <div style="font-size:26px;line-height:1;margin-bottom:4px">${icon}</div>
        <div style="font-size:10px;color:var(--txl);margin-bottom:5px;min-height:28px;line-height:1.3">${tekst}</div>
        <div style="font-family:'Fredoka One',cursive;font-size:15px;color:var(--or)">${max}° <span style="font-size:11px;color:var(--txl);font-family:'Nunito',sans-serif">/ ${min}°</span></div>
        <div style="font-size:11px;font-weight:700;margin-top:3px;${regenKleur}">🌧️ ${regen}%</div>
      </div>`;
    }).join("");
    el.innerHTML = `<div class="card" style="padding:12px 16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span style="font-family:'Fredoka One',cursive;font-size:14px;color:var(--bd)">🌤️ Weer · ${naam}</span>
        <span style="font-size:10px;color:var(--txl)">Open-Meteo</span>
      </div>
      <div style="display:flex;gap:0">${cols}</div>
    </div>`;
  } catch(e) {
    // Geen internet of API fout: blok niet tonen
    if (el) el.innerHTML = "";
  }
}

// ── Push Notificaties (FCM) ───────────────────────────────────────────────
// Stap 1: Haal je VAPID key op via Firebase Console → Project Settings
//         → Cloud Messaging → Web Push certificates → Generate key pair
// Stap 2: Vervang de waarde hieronder door jouw eigen key
const FCM_VAPID_KEY = "JOUW_VAPID_KEY_HIER";

async function registreerPushNotificaties() {
  try {
    if (!("serviceWorker" in navigator)) {
      return toast("⚠️ Service Workers worden niet ondersteund door deze browser");
    }
    const reg = await navigator.serviceWorker.register("/Bens_boerderij/firebase-messaging-sw.js", { scope: "/Bens_boerderij/" });
    const permission = await Notification.requestPermission();
    if (permission !== "granted") {
      toast("🔕 Geen toestemming voor notificaties");
      return;
    }
    const token = await getToken(messaging, {
      vapidKey: FCM_VAPID_KEY,
      serviceWorkerRegistration: reg
    });
    if (token) {
      // Verwijder eerst alle bestaande tokens om duplicaten te voorkomen
      await dbRemove("fcmTokens/" + currentUser.uid);
      // Sla nieuw token op
      await dbSave("fcmTokens/" + currentUser.uid, {
        token,
        bijgewerkt: today(),
        apparaat: navigator.userAgent.slice(0, 100)
      });
      toast("🔔 Pushmeldingen ingeschakeld!");
      render();
    } else {
      toast("⚠️ Kon geen FCM token ophalen");
    }
  } catch(e) {
    console.error("FCM registratie mislukt:", e);
    toast("⚠️ " + (e.message || e.code || "Onbekende fout"));
  }
}

async function uitschakelenPushNotificaties() {
  if (!currentUser) return;
  await dbRemove("fcmTokens/" + currentUser.uid);
  toast("🔕 Pushmeldingen uitgeschakeld");
  render();
}

function getVolgendeAboDatum(abo, vanafDatum) {
  const start = abo.startdatum || vanafDatum;
  const eind  = abo.einddatum || null;
  const dag   = abo.dag;
  const freq  = abo.frequentie || "week";
  let d = new Date(vanafDatum + "T12:00:00");
  for (let i = 0; i < 370; i++) {
    const ds = d.toISOString().slice(0, 10);
    if (ds < start) { d.setDate(d.getDate()+1); continue; }
    if (eind && ds > eind) return null;
    if (d.getDay() === dag) {
      if (freq === "week") return ds;
      const diffDagen = Math.round((d - new Date(start+"T12:00:00")) / 86400000);
      if (freq === "2week" && diffDagen % 14 === 0) return ds;
      if (freq === "maand") {
        const startDag = new Date(start+"T12:00:00").getDate();
        if (d.getDate() === startDag || Math.abs(d.getDate()-startDag) <= 6) return ds;
      }
    }
    d.setDate(d.getDate()+1);
  }
  return null;
}

const FW_EMOJIS = ['🥚','🥚','🥚','🐔','🐔','🐣','✨','⭐'];
let _fwParticles = [];
let _fwAnimId = null;

function _fwExplode(x, y) {
  const colors = ['#e07b00','#f5a623','#ffd700','#27ae60','#3498db','#e74c3c','#fff','#ff6b9d','#a29bfe'];
  const color = colors[Math.floor(Math.random() * colors.length)];
  const count = 55 + Math.floor(Math.random() * 35);
  for(let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + (Math.random() - 0.5) * 0.4;
    const speed = 1.5 + Math.random() * 5;
    _fwParticles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 0.5,
      alpha: 1,
      color,
      size: 1.5 + Math.random() * 2.5,
      gravity: 0.07,
      decay: 0.013 + Math.random() * 0.007
    });
  }
}

function _fwSpawnEmoji(x, y) {
  const emoji = FW_EMOJIS[Math.floor(Math.random() * FW_EMOJIS.length)];
  const angle = Math.random() * Math.PI * 2;
  const speed = 3 + Math.random() * 5;
  const el = document.createElement('div');
  el.className = 'fw-emoji';
  el.textContent = emoji;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  document.body.appendChild(el);
  let vx = Math.cos(angle) * speed;
  let vy = Math.sin(angle) * speed - 3;
  let opacity = 1;
  let scale = 0.4;
  let frame = 0;
  function tick() {
    frame++; vx *= 0.97; vy += 0.15; opacity -= 0.018; scale = Math.min(1.2, scale + 0.06);
    el.style.left = (parseFloat(el.style.left) + vx) + 'px';
    el.style.top  = (parseFloat(el.style.top)  + vy) + 'px';
    el.style.opacity = opacity;
    el.style.transform = `scale(${scale}) rotate(${frame*3}deg)`;
    if(opacity > 0.02) requestAnimationFrame(tick); else el.remove();
  }
  requestAnimationFrame(tick);
}

function _fwAnimate() {
  const canvas = document.getElementById('fw-canvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0.13)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  _fwParticles = _fwParticles.filter(p => p.alpha > 0.02);
  _fwParticles.forEach(p => {
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fillStyle = p.color + Math.floor(p.alpha*255).toString(16).padStart(2,'0');
    ctx.fill();
    ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x - p.vx*2, p.y - p.vy*2);
    ctx.strokeStyle = p.color + Math.floor(p.alpha*120).toString(16).padStart(2,'0');
    ctx.lineWidth = p.size * 0.6; ctx.stroke();
    p.x += p.vx; p.y += p.vy; p.vy += p.gravity; p.vx *= 0.985; p.alpha -= p.decay;
  });
  if(_fwParticles.length > 0) { _fwAnimId = requestAnimationFrame(_fwAnimate); }
  else { canvas.style.display='none'; ctx.clearRect(0,0,canvas.width,canvas.height); _fwAnimId=null; }
}

function _fwLaunch(canvas, targetX, targetY) {
  const ctx = canvas.getContext('2d');
  let cy = canvas.height + 10;
  const step = (canvas.height - targetY) / 18;
  const interval = setInterval(() => {
    cy -= step;
    ctx.beginPath(); ctx.arc(targetX, cy, 2, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,200,80,0.8)'; ctx.fill();
    if(cy <= targetY) {
      clearInterval(interval);
      _fwExplode(targetX, targetY);
      const n = 4 + Math.floor(Math.random()*4);
      for(let i=0;i<n;i++) setTimeout(()=>_fwSpawnEmoji(targetX,targetY), i*80);
      if(!_fwAnimId) _fwAnimId = requestAnimationFrame(_fwAnimate);
    }
  }, 16);
}

function startVuurwerk() {
  const canvas = document.getElementById('fw-canvas');
  if(!canvas) return;
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  canvas.style.display = 'block';
  _fwParticles = [];
  if(_fwAnimId) { cancelAnimationFrame(_fwAnimId); _fwAnimId = null; }
  canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);

  const cx = canvas.width/2;
  const shots = [
    {x:cx,       y:canvas.height*0.22, d:0},
    {x:cx-130,   y:canvas.height*0.30, d:300},
    {x:cx+130,   y:canvas.height*0.30, d:500},
    {x:cx-60,    y:canvas.height*0.18, d:700},
    {x:cx+60,    y:canvas.height*0.18, d:900},
    {x:cx,       y:canvas.height*0.28, d:1200},
    {x:cx-100,   y:canvas.height*0.22, d:1500},
    {x:cx+100,   y:canvas.height*0.22, d:1700},
  ];
  shots.forEach(s => setTimeout(()=>_fwLaunch(canvas,s.x,s.y), s.d));
  setTimeout(()=>{ if(_fwAnimId){cancelAnimationFrame(_fwAnimId);_fwAnimId=null;} canvas.style.display='none'; canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height); }, 5000);
}

// ── Sync publieke data naar Firebase ──────────────────────────────────────
async function syncPubliekeData() {
  // Bereken voorraad en gemiddelde
  const totGelegd      = leg.reduce((s,r)=>s+(r.aantal||0),0);
  const totKapotSync   = leg.reduce((s,r)=>s+(r.kapot||0),0);
  const totVerkocht    = vk.reduce((s,r)=>s+(r.aantal||0),0);
  const totGereserveerd= reserveringen.filter(r=>r.status==="nieuw").reduce((s,r)=>s+(r.aantal||0),0);
  // Voorraad = gelegd - kapot - verkocht - gereserveerd
  // Abonnements-reserveringen tellen al mee via totGereserveerd (Cloud Function maakt ze aan)
  const voorraad = totGelegd - totKapotSync - totVerkocht - totGereserveerd;
  const recent7     = [...leg].reverse().slice(0,7).filter(r=>r.aantal>0);
  const gemDag      = recent7.length
    ? Math.round(recent7.reduce((s,r)=>s+(r.aantal||0),0)/recent7.length)
    : null;
  const doosjeGrootte = instellingen.doosjeGrootte || 6;
  const gereserveerd = reserveringen.filter(r=>r.status==="nieuw").reduce((s,r)=>s+(r.aantal||0),0);
  try {
    const prijsPerEi2 = instellingen.prijsPerEi || 0.40;
    await set(ref(db,"publiek"), { voorraad, gemDag, doosjeGrootte, gereserveerd, prijsPerEi: prijsPerEi2, prijsDoosje6: instellingen.prijsDoosje6 ?? 2.50, prijsDoosje10: instellingen.prijsDoosje10 ?? 4.00, bezorgkosten: instellingen.bezorgkosten ?? 1.00, seizoensNieuws: instellingen.seizoensNieuws || "", seizoensVanaf: instellingen.seizoensVanaf || "", seizoensTm: instellingen.seizoensTm || "", bijgewerkt: today() });
  } catch(e) { /* silently fail */ }
}

        '<div class="fg"><label class="fl">Afhalen of bezorgen?</label>' +
          '<div style="display:flex;gap:8px">' +
            '<div id="abo-opt-ophalen" onclick="window.setAboLeverwijze(\'ophalen\')" style="flex:1;border:1.5px solid var(--or);border-radius:10px;padding:10px;text-align:center;cursor:pointer;background:var(--or);color:#fff">' +
              '<div style="font-size:18px">🏠</div><div style="font-family:\'Fredoka One\',cursive;font-size:13px">Ophalen</div><div style="font-size:10px">Gratis</div>' +
            '</div>' +
            '<div id="abo-opt-bezorgen" onclick="window.setAboLeverwijze(\'bezorgen\')" style="flex:1;border:1.5px solid var(--gd);border-radius:10px;padding:10px;text-align:center;cursor:pointer;background:var(--gl);color:var(--bd)">' +
              '<div style="font-size:18px">🚲</div><div style="font-family:\'Fredoka One\',cursive;font-size:13px">Bezorgen</div><div style="font-size:10px">+€' + (window._pubBezorgkosten||1.00).toFixed(2).replace(".",",") + ' · Ulestraten</div>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div id="abo-adres-div" style="display:none" class="fg"><label class="fl">Bezorgadres</label><input type="text" id="abo-adres" placeholder="Straat en huisnummer..."></div>' +
        '<button class="btn btn-s" onclick="window.savePeriodiekBestelling()" style="margin-top:4px;background:linear-gradient(90deg,#27ae60,#2ecc71)">🔄 Periodieke bestelling instellen</button>' +
      '</div>' +
    '</div>' +
    '<div class="res-card">' +
      '<h2 style="font-family:\'Fredoka One\',cursive;font-size:16px;color:var(--bd);margin-bottom:4px">🔐 Ben\'s Boerderij login</h2>' +
      '<div style="font-size:11px;color:var(--txl);margin-bottom:12px">Alleen voor beheerders</div>' +
      '<div class="login-error' + (errorMsg ? ' show' : '') + '" id="login-err">' + (errorMsg||'') + '</div>' +
      '<div class="fg"><label class="fl">E-mailadres</label>' +
        '<input type="email" id="login-email" placeholder="jouw@email.nl" inputmode="email" autocomplete="email">' +
      '</div>' +
      '<div class="fg"><label class="fl">Wachtwoord</label>' +
        '<input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"' +
        ' onkeydown="if(event.key===\'Enter\')window.doLogin()">' +
      '</div>' +
      '<button class="btn btn-p" id="login-btn" onclick="window.doLogin()" style="margin-top:4px">🔑 Inloggen</button>' +
    '</div>' +
    '<div style="font-size:10px;color:var(--txl);text-align:center;margin-top:8px">🥚 Eicode: 0 Biologisch · 🇳🇱 NL</div>' +
    '</div>';
}


async function doLogin() {
  const email = val("login-email").trim();
  const pass  = val("login-pass");
  if(!email||!pass) return showLoginError("Vul e-mail en wachtwoord in");
  const btn = $("login-btn");
  if(btn){ btn.textContent="⏳ Bezig..."; btn.disabled=true; }
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    // onAuthStateChanged handles the rest
  } catch(e) {
    const msgs = {
      "auth/user-not-found":    "Onbekend e-mailadres",
      "auth/wrong-password":    "Onjuist wachtwoord",
      "auth/invalid-email":     "Ongeldig e-mailadres",
      "auth/too-many-requests": "Te veel pogingen, probeer later opnieuw",
      "auth/invalid-credential":"Onjuist e-mailadres of wachtwoord",
    };
    showLoginError(msgs[e.code] || "Inloggen mislukt: "+e.message);
  }
}

function showLoginError(msg) {
  renderLogin(msg);
}

async function doLogout() {
  if(!await bevestig("Uitloggen?", "Uitloggen", "btn-d")) return;
  await signOut(auth);
}

// ── Topbar logout button ────────────────────────────────────────────────────
// Injected into topbar after render — handled in render() topbar section

// ── Boot ───────────────────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  // Watch auth state — this is the single entry point
  onAuthStateChanged(auth, user => {
    currentUser = user;
    if(user) {
      // Logged in: show app
      $("loading") && ($("loading").style.display="none");
      render();
      startListeners();
      updateOfflineBanner();
      setTimeout(syncPubliekeData, 2000); // populate /publiek after data loads
    } else {
      // Not logged in: fetch minimal public data then show login
      $("loading") && ($("loading").style.display="none");
      // Lees publiek leesbare nodes + /publiek voor gereserveerd
      Promise.all([
        get(ref(db,"legdagen")),
        get(ref(db,"verkopen")),
        get(ref(db,"instellingen")),
        get(ref(db,"publiek"))
      ]).then(([legSnap, vkSnap, instSnap, pubSnap]) => {
        const legData = legSnap.exists() ? Object.values(legSnap.val()) : [];
        const totGelegd = legData.reduce((s,r)=>s+(r.aantal||0),0);
        const vkData = vkSnap.exists() ? Object.values(vkSnap.val()) : [];
        const totVerkocht = vkData.reduce((s,r)=>s+(r.aantal||0),0);
        const inst = instSnap.exists() ? instSnap.val() : {};
        // Gereserveerd uit /publiek (weggeschreven door Ben, altijd leesbaar)
        const pub = pubSnap.exists() ? pubSnap.val() : {};
        const totGereserveerd = typeof pub.gereserveerd==="number" ? pub.gereserveerd : 0;
        const gesorteerd = legData.filter(r=>r.aantal>0).sort((a,b)=>b.datum.localeCompare(a.datum));
        const recent7 = gesorteerd.slice(0,7);
        const gemDag = recent7.length ? Math.round(recent7.reduce((s,r)=>s+(r.aantal||0),0)/recent7.length) : null;
        window._pubVoorraad      = totGelegd - totVerkocht - totGereserveerd;
        window._pubGemDag        = gemDag;
        window._pubDoosje        = inst.doosjeGrootte || 6;
        window._pubPrijsDoosje6  = inst.prijsDoosje6 || 2.50;
        window._pubPrijsDoosje10 = inst.prijsDoosje10 || 4.00;
        window._pubBezorgkosten    = inst.bezorgkosten || 1.00;
        window._pubSeizoensNieuws  = inst.seizoensNieuws || "";
        window._pubSeizoensVanaf   = inst.seizoensVanaf || "";
        window._pubSeizoenssTm     = inst.seizoensTm || "";
        window._pubGereserveerd  = totGereserveerd;
        window._pubPrijs         = inst.prijsPerEi || 0.40;
        renderLogin();
      }).catch(err => {
        console.warn("Publieke data niet beschikbaar:", err.message);
        // Fallback: probeer alleen /publiek te lezen (geschreven door Ben na inlog)
        get(ref(db,"publiek")).then(snap => {
          if(snap.exists()) {
            const p = snap.val();
            window._pubVoorraad = typeof p.voorraad==="number" ? p.voorraad : null;
            window._pubGemDag   = typeof p.gemDag==="number"   ? p.gemDag   : null;
            window._pubDoosje        = p.doosjeGrootte || 6;
            window._pubPrijsDoosje6  = p.prijsDoosje6 || 2.50;
            window._pubPrijsDoosje10 = p.prijsDoosje10 || 4.00;
            window._pubBezorgkosten  = p.bezorgkosten || 1.00;
            window._pubSeizoensNieuws = p.seizoensNieuws || "";
            window._pubSeizoensVanaf  = p.seizoensVanaf || "";
            window._pubSeizoenssTm    = p.seizoensTm || "";
            window._pubGereserveerd  = typeof p.gereserveerd==="number" ? p.gereserveerd : 0;
            window._pubPrijs         = p.prijsPerEi || 0.40;
          }
          renderLogin();
        }).catch(() => renderLogin());
      });
    }
  });
});
</script>
